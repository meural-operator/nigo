# =============================================================================
# TurboNIGO — Conda Environment (ICML 2026 Submission)
# =============================================================================
#
# Creates a reproducible environment for training and evaluating TurboNIGO.
#
# Usage:
#   conda env create -f environment.yml
#   conda activate turbo_nigo
#
# GPU Requirement:
#   This project requires an NVIDIA GPU with CUDA support.
#   After activating the environment, verify GPU availability:
#     python -c "import torch; assert torch.cuda.is_available(), 'ERROR: No GPU detected. Install NVIDIA drivers and CUDA toolkit.'; print(f'GPU OK: {torch.cuda.get_device_name(0)}')"
#
# Tested on:
#   - Python 3.13, PyTorch 2.10.0+cu130, CUDA 13.0
#   - NVIDIA RTX 4000 Ada (48 GB), Windows 11
# =============================================================================

name: turbo_nigo

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # --- Core Scientific Stack ---
  - numpy>=2.3
  - scipy>=1.17
  - h5py>=3.15

  # --- Visualization ---
  - matplotlib>=3.10

  # --- Utilities ---
  - pyyaml>=6.0
  - tqdm>=4.67

  # --- Testing ---
  - pytest>=9.0

  # --- PyTorch (CUDA 13.0) — installed via pip for exact version control ---
  - pip:
    - torch==2.10.0+cu130
    - torchvision==0.25.0+cu130
    - --extra-index-url https://download.pytorch.org/whl/cu130

    # --- Optional but recommended ---
    - tensorboard>=2.18
    - pytest-mock>=3.15
