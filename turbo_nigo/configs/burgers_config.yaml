# =============================================================================
# TurboNIGO Configuration — Burgers Equation
# =============================================================================

experiment_name: "TurboNIGO_Burgers"
dataset_type: "burgers"
data_root: "./datasets/burgers/burgers_data_R10.mat"
results_dir: "./results_burgers"

# --- Model Selection ---
model_type: "v1"                 # "v1" (GlobalTurboNIGO) or "v2" (attention-physics)
physics_net_type: "distribution" # "distribution" or "spatial" (V2 only)

# --- Training Hyperparameters ---
epochs: 300
batch_size: 64
learning_rate: 0.0002
weight_decay: 1.0e-6
seq_len: 1                      # Single-step for FNO-style Burgers (set >1 for temporal)
dt: 1.0                         # Pseudo-time step for single-step mapping

# --- Model Architecture ---
latent_dim: 64
width: 32
num_bases: 8
cond_dim: 4
in_channels: 1
spatial_size: 64                 # 1D→2D target resolution

# --- Loss Weights ---
physics_prior_weight: 0.001
spectral_loss_weight: 0.1       # Fourier-space loss (helpful for sharp gradients)
relative_l2_weight: 0.0

# --- LR Scheduler ---
scheduler: "cosine"
warmup_epochs: 5
min_lr: 1.0e-6

# --- Training Robustness ---
grad_clip_norm: 1.0
early_stopping_patience: 50

# --- Checkpointing ---
checkpoint_freq: 30
resume_from: null

# --- Logging ---
use_tensorboard: true
log_grad_norm: true

# --- System ---
seed: 42
num_workers: 4
use_amp: true
device: "cuda"
tf32: true
cudnn_benchmark: true
compile: false

# --- Burgers-Specific ---
viscosity: 0.1
train_split: 0.8
target_spatial_res: 64
