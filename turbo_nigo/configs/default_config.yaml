# =============================================================================
# TurboNIGO Default Configuration
# All paths are relative for double-blind submission compliance.
# =============================================================================

experiment_name: "Turbo_NIGO_Default"
data_root: "./datasets/bc"
results_dir: "./results"

# --- Training Hyperparameters ---
epochs: 300
batch_size: 64
learning_rate: 0.0002
seq_len: 20
dt: 0.1

# --- Model Architecture ---
latent_dim: 64
width: 32
num_bases: 8
cond_dim: 4
in_channels: 2

# --- Physics and Prior Weights ---
physics_prior_weight: 0.001

# --- LR Scheduler ---
scheduler: "cosine"          # "cosine", "plateau", "step", "none"
warmup_epochs: 5
min_lr: 1.0e-6
# plateau-specific
plateau_factor: 0.5
plateau_patience: 10
# step-specific
step_size: 50
step_gamma: 0.5

# --- Training Robustness ---
grad_clip_norm: 1.0          # Max gradient norm for clipping (0 = disabled)
early_stopping_patience: 0   # Epochs with no val improvement before stopping (0 = disabled)

# --- Logging ---
use_tensorboard: true
log_grad_norm: true

# --- Checkpointing & Resumability ---
checkpoint_freq: 5           # Save periodic checkpoint every N epochs
resume_from: null             # Path to checkpoint file to resume from, or null

# --- System Settings ---
seed: 42
num_workers: 8                # 8 workers for fast IO loading
use_amp: true
device: "cuda"                # "cuda" or "cpu"

# --- Compute Optimizations ---
compile: false                # wrap model in torch.compile() (Requires Triton, WSL/Linux recommended)
tf32: true                    # Enable TensorFloat-32 on Ada architecture
cudnn_benchmark: true         # Enable cuDNN autotuner
